<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPC! - Evaluación de Nico</title>
  <link rel="stylesheet" href="navbar.css">
  
  <!-- Librería html2canvas para capturar la imagen -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* Carga de Fuentes desde la carpeta local 'fonts/' */
    @font-face {
      font-family: 'Unbounded';
      src: url('fonts/Unbounded-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Unbounded';
      src: url('fonts/Unbounded-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Italic.ttf') format('truetype');
      font-weight: 400;
      font-style: italic;
    }

    /* --- Reset y Estilos Base --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary-color: #2bbbb0; /* Turquesa característico de Nico */
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background-color: #000000;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* Layout Principal (Ancho unificado a 600px para consistencia) */
    .eval-wrapper {
      width: 100%;
      max-width: 600px;
      background-color: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* --- BARRA DE NAVEGACIÓN SUPERIOR (NAVBAR) --- */
    .navbar {
      background-color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      width: 100%;
      box-sizing: border-box;
      border-bottom: 2px solid #000000;
    }

    .brand-logo {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 900;
      color: #000000;
      text-decoration: none;
      letter-spacing: -1px;
    }

    .nav-links {
      display: flex;
      gap: clamp(0.8rem, 3vw, 2rem);
      list-style: none;
    }

    .nav-links a {
      font-family: 'Unbounded', sans-serif;
      text-decoration: none;
      color: #000000;
      font-size: clamp(0.75rem, 2.2vw, 0.95rem);
      font-weight: 700;
      transition: opacity 0.2s;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    /* CONTENEDOR INTERNO DEL QUIZ */
    .eval-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* Tag de Categoría Superior */
    .category-tag-container {
      margin-bottom: 20px;
    }

    .category-tag {
      display: inline-block;
      background-color: var(--primary-color);
      color: #000000;
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 900;
      padding: 8px 20px;
      border-radius: 6px;
      border: 2px solid #000000;
      box-shadow: 2px 2px 0px #ffffff;
    }

    /* --- ESTADOS DE PREGUNTAS --- */
    .quiz-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .question-title {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 900;
      text-align: center;
      margin-bottom: 25px;
      line-height: 1.2;
    }

    /* Grid de Opciones adaptado a 3 columnas horizontales */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      margin-bottom: 30px;
    }

    /* Tarjetas de Respuestas */
    .option-card {
      background-color: #000000;
      border: 2.5px solid #ffffff;
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 110px;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 3px 3px 0px rgba(255, 255, 255, 0.2);
    }

    .option-card p {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      font-weight: 600;
      line-height: 1.25;
    }

    .option-card img {
      max-width: 100%;
      max-height: 75px;
      height: auto;
      border-radius: 6px;
      object-fit: contain;
    }

    /* Opción Seleccionada */
    .option-card.selected {
      border: 3px solid var(--primary-color);
      box-shadow: 4px 4px 0px var(--primary-color);
      transform: translateY(-2px);
      background-color: rgba(43, 187, 176, 0.05);
    }

    /* Contenedor de Botones de Acción */
    .action-btn-container {
      margin-top: auto;
      margin-bottom: 20px;
      width: 100%;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-action {
      background-color: var(--primary-color);
      color: #000000;
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(0.8rem, 2.2vw, 1rem);
      font-weight: 900;
      padding: 12px 14px;
      border: 2.5px solid #000000;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 4px 4px 0px #ffffff;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      flex: 1;
      min-width: 120px;
      max-width: 180px;
      text-align: center;
    }

    .btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 5px 5px 0px #ffffff;
    }

    .btn-action:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      border-color: #666666;
    }

    /* Botón Secundario */
    .btn-secondary {
      background-color: #000000;
      color: #ffffff;
      border: 2.5px solid #ffffff;
      box-shadow: 4px 4px 0px rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
      box-shadow: 5px 5px 0px #ffffff;
    }

    /* --- ESTADO DE RESULTADO --- */
    .result-container {
      display: none;
      flex-direction: column;
      gap: 25px;
      align-items: center;
      flex: 1;
      padding: 15px 10px;
      text-align: center;
      background-color: #000000; /* Asegura fondo sólido para la imagen */
    }

    .result-left {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .result-subtitle {
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 600;
      color: #cccccc;
    }

    .result-concept {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 900;
      line-height: 1.15;
      color: var(--primary-color);
      text-shadow: 2px 2px 0px #000000;
    }

    .result-example {
      font-size: clamp(0.95rem, 2.8vw, 1.1rem);
      line-height: 1.4;
      color: #dddddd;
      max-width: 90%;
      margin: 0 auto;
    }

    .result-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #111111;
      border: 2px solid #ffffff;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      box-shadow: 4px 4px 0px rgba(255, 255, 255, 0.3);
    }

    .arquetipo-header {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 900;
      margin-bottom: 6px;
      color: #aaaaaa;
      letter-spacing: 1px;
    }

    .arquetipo-nombre {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.6rem);
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 15px;
    }

    .arquetipo-card-img {
      width: 100%;
      max-width: 180px;
      height: auto;
      border: 2px solid #ffffff;
      border-radius: 10px;
      box-shadow: 3px 3px 0px var(--primary-color);
    }

    /* --- ESTILOS DE IMPRESIÓN (PDF) --- */
    @media print {
      .navbar, 
      .category-tag-container, 
      #quiz-screen, 
      .action-btn-container {
        display: none !important;
      }
      
      .result-container {
        display: flex !important;
        padding: 0;
      }

      body, html, .eval-wrapper, .eval-content {
        background-color: #000000 !important;
        width: 100% !important;
        height: 100% !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    /* Adaptación Pantallas Pequeñas */
    @media (max-width: 600px) {
      .eval-wrapper {
        max-width: 100vw;
      }
      .navbar {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="eval-wrapper">
    <!-- BARRA DE NAVEGACIÓN SUPERIOR -->
    <header class="navbar">
      <a href="index.html" class="brand-logo-link">
        <img src="images/logo.png" alt="NPC! Logo" class="brand-logo-img">
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="concepto.html">Concepto</a></li>
          <li><a href="metodos.html">Métodos</a></li>
          <li><a href="guias.html">Tu guía</a></li>
        </ul>
      </nav>
    </header>

    <div class="eval-content">
      <!-- Categoría -->
      <div class="category-tag-container">
        <span class="category-tag" id="category-name">Ilustración</span>
      </div>

      <!-- PANTALLA DE PREGUNTAS (1, 2 y 3) -->
      <main class="quiz-container" id="quiz-screen">
        <h2 class="question-title" id="question-text">1. ¿Con cuál de estas frases identificas tu marca?</h2>
        
        <div class="options-grid" id="options-container">
          <!-- Opciones renderizadas por JS -->
        </div>

        <div class="action-btn-container">
          <button class="btn-action btn-secondary" id="btn-prev" onclick="retrocederPregunta()" style="display: none;">ANTERIOR</button>
          <button class="btn-action" id="btn-next" disabled onclick="avanzarPregunta()">SIGUIENTE</button>
        </div>
      </main>

      <!-- PANTALLA DE RESULTADO FINAL -->
      <section class="result-container" id="result-screen">
        <div class="result-left">
          <p class="result-subtitle">Tu concepto sería:</p>
          <h1 class="result-concept" id="res-concepto">Dejar huellas que inspiran</h1>
          <p class="result-example" id="res-ejemplo">Tu arte existe para motivar, transformar y dejar una huella en los demás.</p>
        </div>

        <div class="result-right">
          <span class="arquetipo-header">ARQUETIPO ASIGNADO:</span>
          <h3 class="arquetipo-nombre" id="res-arquetipo">EL HÉROE</h3>
          <img src="images/arquetipo-heroe.png" alt="Arquetipo" class="arquetipo-card-img" id="res-imagen">
        </div>

        <!-- BOTONES DE ACCIÓN EN RESULTADOS -->
        <div class="action-btn-container" style="margin-top: 10px;">
          <button class="btn-action btn-secondary" onclick="reiniciarQuiz()">REHACER</button>
          <button class="btn-action btn-secondary" onclick="guardarComoImagen()">GUARDAR IMAGEN</button>
          <button class="btn-action btn-secondary" onclick="window.print()">GUARDAR PDF</button>
          <a href="final.html" class="btn-action" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">FINALIZAR</a>
        </div>
      </section>
    </div>
  </div>

  <script>
    /* 1. DICCIONARIO DE RESULTADOS */
    const NICO_RESULTS = {
      AAA: { concepto: "Dejar huellas que inspiran", ejemplo: "Tu arte existe para motivar, transformar y dejar una huella en los demás", arquetipo: "EL HÉROE", imagen: "arquetipo-heroe.png" },
      AAB: { concepto: "Transformar el futuro", ejemplo: "Imaginas nuevas posibilidades y conviertes tu ideas en realidad", arquetipo: "EL MAGO", imagen: "arquetipo-mago.png" },
      AAC: { concepto: "Legado personal", ejemplo: "Construyes una identidad sólida que trasciende tendencias y permanece en la memoria", arquetipo: "EL GOBERNANTE", imagen: "arquetipo-gobernante.png" },
      ABA: { concepto: "Liderar el cambio", ejemplo: "Tus ilustraciones invitan a avanzar, cuestionar y evolucionar.", arquetipo: "EL HÉROE", imagen: "arquetipo-heroe.png" },
      ABB: { concepto: "Movimiento disruptivo", ejemplo: "Tu creatividad desafía lo establecido y abre nuevos caminos", arquetipo: "EL REBELDE", imagen: "arquetipo-rebelde.png" },
      ABC: { concepto: "Construir algo duradero", ejemplo: "Buscas crear un universo visual coherente que resista el paso del tiempo", arquetipo: "EL GOBERNANTE", imagen: "arquetipo-gobernante.png" },
      ACA: { concepto: "Inspirar desde lo humano", ejemplo: "Tus historias conectan con las personas desde la empatía y el apoyo", arquetipo: "EL CUIDADOR", imagen: "arquetipo-cuidador.png" },
      ACB: { concepto: "Innovación con propósito", ejemplo: "Cada idea tiene una razón de ser y busca aportar una nueva mirada", arquetipo: "EL SABIO", imagen: "arquetipo-sabio.png" },
      ACC: { concepto: "Orden visual", ejemplo: "Busco la perfección y transformar el caos de las ideas en imperios visuales", arquetipo: "EL GOBERNANTE", imagen: "arquetipo-gobernante.png" },
      BAA: { concepto: "Conexiones significativas", ejemplo: "Tu arte busca acompañar, comprender y acercar a las personas", arquetipo: "EL CUIDADOR", imagen: "arquetipo-cuidador.png" },
      BAB: { concepto: "Momentos inolvidables", ejemplo: "Creas emociones que permanecen mucho después de haber sido vistas", arquetipo: "EL AMANTE", imagen: "arquetipo-amante.png" },
      BAC: { concepto: "Conexión genuina", ejemplo: "La autenticidad y la sencillez son el corazón de tu propuesta", arquetipo: "EL AMIGO", imagen: "arquetipo-amigo.png" },
      BBA: { concepto: "La magia de compartir", ejemplo: "Crees que las mejores historias son las que se comparten", arquetipo: "EL AMANTE", imagen: "arquetipo-amante.png" },
      BBB: { concepto: "Brillo encantador", ejemplo: "Buscas sorprender y maravillar a otros con tu propio estilo y brillo", arquetipo: "EL BUFÓN", imagen: "arquetipo-bufon.png" },
      BBC: { concepto: "Sentido de pertenencia", ejemplo: "Construyes espacios donde las personas pueden sentirse identificadas", arquetipo: "EL AMIGO", imagen: "arquetipo-amigo.png" },
      BCA: { concepto: "Donde nacen las sonrisas", ejemplo: "Tu obra florece cuando genera encuentros y conversaciones", arquetipo: "EL CUIDADOR", imagen: "arquetipo-cuidador.png" },
      BCB: { concepto: "Donde las estrellas se unen", ejemplo: "Tus creaciones conectan personas, historias y emociones en un mismo universo", arquetipo: "EL BUFÓN", imagen: "arquetipo-bufon.png" },
      BCC: { concepto: "Lo hermoso de ser auténtico", ejemplo: "La honestidad emocional es lo que hace única a tu marca", arquetipo: "EL AMANTE", imagen: "arquetipo-amante.png" },
      CAA: { concepto: "Imaginación que inspira", ejemplo: "Invitas a otros a mirar el mundo con curiosidad y asombro", arquetipo: "EL INOCENTE", imagen: "arquetipo-inocente.png" },
      CAB: { concepto: "Arquitecto de sueños", ejemplo: "Transformas la imaginación en lugares donde todo parece posible", arquetipo: "EL MAGO", imagen: "arquetipo-mago.png" },
      CAC: { concepto: "Arquitecto de sueños", ejemplo: "Transformas la imaginación en lugares donde todo parece posible", arquetipo: "EL CREADOR", imagen: "arquetipo-creador.png" },
      CBA: { concepto: "Aventuras inspiradoras", ejemplo: "Cada ilustración es una invitación a descubrir algo nuevo y salir de la zona de confort", arquetipo: "EL EXPLORADOR", imagen: "arquetipo-explorador.png" },
      CBB: { concepto: "Innovación creativa", ejemplo: "Experimentas constantemente para encontrar nuevas formas de expresión", arquetipo: "EL CREADOR", imagen: "arquetipo-creador.png" },
      CBC: { concepto: "Libertad para imaginar", ejemplo: "No sigues caminos predefinidos, prefieres descubrir tu propio destino", arquetipo: "EL EXPLORADOR", imagen: "arquetipo-explorador.png" },
      CCA: { concepto: "Noches de fantasía", ejemplo: "Creas refugios y una comunidad donde la imaginación puede volar", arquetipo: "EL INOCENTE", imagen: "arquetipo-inocente.png" },
      CCB: { concepto: "Creador de sueños", ejemplo: "Conviertes ideas ordinarias en experiencias extraordinarias", arquetipo: "EL MAGO", imagen: "arquetipo-mago.png" },
      CCC: { concepto: "Universo de posibilidades", ejemplo: "Tu objetivo es construir un mundo visual tan único como tu visión", arquetipo: "EL CREADOR", imagen: "arquetipo-creador.png" }
    };

    /* 2. PREGUNTAS Y OPCIONES DE NICO */
    const PREGUNTAS_NICO = [
      {
        titulo: "1. ¿Con cuál de estas frases identificas tu marca?",
        opciones: [
          { id: "A", texto: "Quiero dejar mi huella en el mundo" },
          { id: "B", texto: "Quiero conectar con otros" },
          { id: "C", texto: "Quiero volar a otros mundos imaginarios" }
        ]
      },
      {
        titulo: "2. ¿Qué puerta abrirías?",
        opciones: [
          { id: "A", imagen: "images/cuadrado.png", alt: "Cuadrado" },
          { id: "B", imagen: "images/triangulo.png", alt: "Triángulo" },
          { id: "C", imagen: "images/circulo.png", alt: "Círculo" }
        ]
      },
      {
        titulo: "3. ¿Cómo te gustaría ser recordado por tu público?",
        opciones: [
          { id: "A", texto: "INSPIRADOR" },
          { id: "B", texto: "INNOVADOR" },
          { id: "C", texto: "AUTÉNTICO" }
        ]
      }
    ];

    /* 3. ESTADO DEL QUIZ */
    let pasoActual = 0;
    let respuestas = [];
    let opcionSeleccionada = null;

    /* Elementos del DOM */
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');

    /* Cargar la pregunta inicial */
    renderizarPaso();

    function renderizarPaso() {
      const dataPaso = PREGUNTAS_NICO[pasoActual];
      questionText.textContent = dataPaso.titulo;
      optionsContainer.innerHTML = '';

      /* Recuperar la respuesta guardada previamente si el usuario retrocede */
      opcionSeleccionada = respuestas[pasoActual] || null;
      btnNext.disabled = !opcionSeleccionada;

      /* Gestionar visibilidad del botón Anterior */
      if (pasoActual === 0) {
        btnPrev.style.display = 'none';
      } else {
        btnPrev.style.display = 'block';
      }

      /* Gestionar texto del botón Siguiente / Terminar */
      if (pasoActual === PREGUNTAS_NICO.length - 1) {
        btnNext.textContent = "TERMINAR";
      } else {
        btnNext.textContent = "SIGUIENTE";
      }

      /* Generar tarjetas de opciones en formato horizontal (3 columnas) */
      dataPaso.opciones.forEach(opc => {
        const card = document.createElement('div');
        card.className = 'option-card';
        if (opc.id === opcionSeleccionada) {
          card.classList.add('selected');
        }
        card.onclick = () => seleccionarOpcion(card, opc.id);

        if (opc.texto) {
          card.innerHTML = `<p>${opc.texto}</p>`;
        } else if (opc.imagen) {
          card.innerHTML = `<img src="${opc.imagen}" alt="${opc.alt}">`;
        }

        optionsContainer.appendChild(card);
      });
    }

    function seleccionarOpcion(cardElement, optionId) {
      document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
      cardElement.classList.add('selected');
      opcionSeleccionada = optionId;
      btnNext.disabled = false;
    }

    function avanzarPregunta() {
      if (!opcionSeleccionada) return;
      
      /* Guardar o actualizar la respuesta del paso actual en el array */
      respuestas[pasoActual] = opcionSeleccionada;

      if (pasoActual < PREGUNTAS_NICO.length - 1) {
        pasoActual++;
        renderizarPaso();
      } else {
        mostrarResultado();
      }
    }

    function retrocederPregunta() {
      if (pasoActual > 0) {
        pasoActual--;
        renderizarPaso();
      }
    }

    function mostrarResultado() {
      const clave = respuestas.join('');
      const resultado = NICO_RESULTS[clave] || NICO_RESULTS["AAA"];

      quizScreen.style.display = 'none';
      resultScreen.style.display = 'flex';

      document.getElementById('res-concepto').textContent = resultado.concepto;
      document.getElementById('res-ejemplo').textContent = resultado.ejemplo;
      document.getElementById('res-arquetipo').textContent = resultado.arquetipo;
      document.getElementById('res-imagen').src = 'images/' + resultado.imagen;
    }

    function reiniciarQuiz() {
      pasoActual = 0;
      respuestas = [];
      opcionSeleccionada = null;
      resultScreen.style.display = 'none';
      quizScreen.style.display = 'flex';
      renderizarPaso();
    }

    /* 4. FUNCIÓN PARA GUARDAR COMO IMAGEN (PNG) */
    function guardarComoImagen() {
      const elementoResultado = document.getElementById('result-screen');
      
      // Ocultar temporalmente los botones para que no salgan en la foto
      const botonesAccion = elementoResultado.querySelector('.action-btn-container');
      botonesAccion.style.display = 'none';

      html2canvas(elementoResultado, {
        scale: 2, // Incrementa la nitidez
        backgroundColor: '#000000',
        useCORS: true
      }).then(canvas => {
        // Volver a mostrar los botones
        botonesAccion.style.display = 'flex';

        // Crear enlace de descarga automática
        const enlace = document.createElement('a');
        enlace.download = 'resultado-nico.png';
        enlace.href = canvas.toDataURL('image/png');
        enlace.click();
      }).catch(error => {
        console.error("Error al generar la imagen:", error);
        botonesAccion.style.display = 'flex';
      });
    }
  </script>
</body>
</html>
