<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPC! - Aprender</title>
  
  <link rel="stylesheet" href="navbar.css">
  <style>
    /* Carga de Fuentes desde la carpeta local 'fonts/' */
    @font-face {
      font-family: 'Unbounded';
      src: url('fonts/Unbounded-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Unbounded';
      src: url('fonts/Unbounded-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    /* Reset y Tipografía por Defecto */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background-color: #000000;
    }

    body {
      font-family: 'Unbounded', sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* CONTENEDOR PRINCIPAL: Ancho idéntico al index.html */
    .page-container {
      width: 100%;
      max-width: 600px; /* Ancho constante unificado para PC */
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- CONTENIDO PRINCIPAL DE APRENDER --- */
    .main-content {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px 20px 40px 20px;
      position: relative;
      text-align: center;
    }

    /* Botón Volver */
    .btn-volver-container {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      margin-bottom: clamp(20px, 4vw, 30px);
    }

    .btn-volver {
      background-color: #ffeb00;
      color: #000000;
      border: 2px solid #000000;
      border-radius: 20px;
      padding: clamp(6px, 1.5vw, 8px) clamp(18px, 4vw, 24px);
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(0.75rem, 2.2vw, 0.95rem);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 3px 3px 0px #ffffff;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-volver:hover {
      transform: translateY(-2px);
      box-shadow: 4px 4px 0px #ffffff;
    }

    .btn-volver:active {
      transform: translateY(1px);
      box-shadow: 1px 1px 0px #ffffff;
    }

    /* Títulos y Subtítulos */
    .aprender-title {
      font-size: clamp(1.35rem, 4.5vw, 2.1rem);
      font-weight: 900;
      color: #ffffff;
      line-height: 1.25;
      width: 100%;
      margin-bottom: clamp(15px, 3.5vw, 25px);
    }

    .aprender-subtitle {
      font-size: clamp(0.85rem, 2.8vw, 1.1rem);
      font-weight: 400;
      color: #ffffff;
      line-height: 1.5;
      width: 100%;
      margin-bottom: clamp(30px, 6vw, 45px);
    }

    /* Opciones / Botones Cards */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 2vw, 15px);
      width: 100%;
    }

    .opt-card {
      border: 2px solid #000000;
      border-radius: 12px;
      padding: clamp(12px, 2.5vw, 18px) clamp(4px, 1.5vw, 10px);
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.9rem);
      font-weight: 900;
      text-decoration: none;
      color: #000000;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 0px #ffffff;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      line-height: 1.3;
      min-height: clamp(65px, 15vw, 90px);
    }

    .opt-card.repasar {
      background-color: #ff007a;
    }

    .opt-card.omitir {
      background-color: #ffeb00;
    }

    .opt-card.aprender {
      background-color: #2bbbb0;
    }

    .opt-card:hover {
      transform: translateY(-3px);
      box-shadow: 6px 6px 0px #ffffff;
    }

    .opt-card:active {
      transform: translateY(1px);
      box-shadow: 2px 2px 0px #ffffff;
    }

    /* AJUSTES RESPONSIVE MÓVIL (≤ 600px) */
    @media (max-width: 600px) {
      .page-container {
        max-width: 100vw;
      }
      .navbar {
        padding: 14px 16px;
      }
      .main-content {
        padding: 20px 15px 30px 15px;
      }
    }
  </style>
</head>
<body>

  <div class="page-container">
    <!-- BARRA DE NAVEGACIÓN SUPERIOR (FUERA DEL CONTENEDOR PARA OCUPAR TODA LA ANCHURA) -->
    <header class="navbar">
      <a href="index.html" class="brand-logo-link">
        <img src="images/logo.png" alt="NPC! Logo" class="brand-logo-img">
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="concepto.html">Concepto</a></li>
          <li><a href="metodos.html">Métodos</a></li>
          <li><a href="guias.html">Tu guía</a></li>
        </ul>
      </nav>
    </header>

    <!-- Cuerpo Principal: Aprender -->
    <main class="main-content">
      <!-- Botón Volver -->
      <div class="btn-volver-container">
        <a href="index.html" class="btn-volver">Volver</a>
      </div>

      <!-- Título principal -->
      <h1 class="aprender-title">¿Tienes experiencia creando conceptos?</h1>

      <!-- Subtítulo / Descripción -->
      <p class="aprender-subtitle">
        Puedes comenzar de inmediato<br>
        o explorar algunos recursos<br>
        antes de iniciar.
      </p>

      <!-- Botones de Acción -->
      <div class="options-grid">
        <a href="concepto.html" class="opt-card repasar">Repasar este tema</a>
        <a href="guias.html" class="opt-card omitir">Omitir este paso</a>
        <a href="metodos.html" class="opt-card aprender">Aprender desde cero</a>
      </div>
    </main>
  </div>

</body>
</html>
