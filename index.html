<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de personajes</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000000;
    color: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100%;
  }

  * {
    box-sizing: border-box;
  }

  .top-menu {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #000000;
    border-bottom: 1px solid #2a2a2a;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-menu-logo {
    color: #ffffff;
    font-weight: 900;
    font-size: 18px;
  }

  .top-menu-reiniciar {
    background: none;
    color: #ffffff;
    border: 1px solid #ffffff;
    border-radius: 6px;
    padding: 8px 16px;
    font-weight: bold;
    font-size: 13px;
    cursor: pointer;
  }

  .top-menu-reiniciar:hover {
    background: #1a1a1a;
  }

  #app {
    padding: 24px 16px 48px 16px;
    display: flex;
    justify-content: center;
  }

  /* ---- Tarjeta de resultado estilo "Nico" ---- */

  .resultado-nico {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 40px;
    max-width: 700px;
    width: 100%;
  }

  .resultado-nico-fila {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 32px;
  }

  .col-texto {
    flex: 1;
    min-width: 0;
  }

  .badge {
    display: inline-block;
    background: #3fc9c2;
    color: #0a0a0a;
    font-weight: bold;
    font-size: 20px;
    padding: 8px 20px;
    border-radius: 6px;
    margin-bottom: 24px;
  }

  .subtitulo {
    font-size: 20px;
    font-weight: bold;
    margin: 0 0 8px 0;
  }

  .titulo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .gotas {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .gota {
    width: 14px;
    height: 14px;
    background: #3fc9c2;
    border-radius: 50% 50% 50% 0;
    transform: rotate(45deg);
  }

  .gota-sm {
    width: 9px;
    height: 9px;
    align-self: flex-end;
  }

  .titulo-principal {
    font-size: 40px;
    font-weight: 900;
    line-height: 1.05;
    margin: 0;
  }

  .descripcion {
    font-size: 16px;
    line-height: 1.5;
    color: #e6e6e6;
    max-width: 380px;
  }

  .col-imagen {
    flex-shrink: 0;
    width: 220px;
    text-align: center;
  }

  .arquetipo-titulo {
    margin-bottom: 12px;
  }

  .arquetipo-label {
    color: #3fc9c2;
    font-weight: bold;
    font-size: 15px;
    margin: 0;
  }

  .arquetipo-nombre {
    color: #ffffff;
    font-weight: 900;
    font-size: 20px;
    margin: 0;
  }

  .imagen-box {
    background: #ffffff;
    border-radius: 24px;
    overflow: hidden;
    width: 100%;
    aspect-ratio: 4 / 5;
  }

  .imagen-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ---- Resultado genérico (Orión) ---- */

  .resultado-generico p {
    font-size: 16px;
  }

  /* ---- Tarjeta de resultado estilo "Fer" ---- */

  .resultado-fer {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 40px;
    max-width: 700px;
    width: 100%;
    text-align: center;
  }

  .fer-encabezado {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    text-align: left;
  }

  .badge-amarillo {
    display: inline-block;
    background: #ffd414;
    color: #0a0a0a;
    font-weight: bold;
    font-size: 20px;
    padding: 8px 20px;
    border-radius: 6px;
  }

  .perfil-label {
    color: #ffd414;
    font-weight: bold;
    font-size: 15px;
    margin: 0;
    text-align: right;
  }

  .perfil-nombre {
    color: #ffd414;
    font-weight: 900;
    font-size: 18px;
    margin: 0;
    text-align: right;
  }

  .fer-subtitulo {
    font-size: 20px;
    font-weight: bold;
    margin: 0 0 12px 0;
  }

  .fer-titulo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .fer-titulo-principal {
    font-size: 40px;
    font-weight: 900;
    line-height: 1.05;
    margin: 0;
  }

  .petalos {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .petalo {
    width: 26px;
    height: 16px;
    background: #ffd414;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  }

  .petalos-izq .petalo:nth-child(1) { transform: rotate(-30deg); align-self: flex-end; }
  .petalos-izq .petalo:nth-child(2) { transform: rotate(20deg); width: 18px; height: 12px; }
  .petalos-izq .petalo:nth-child(3) { transform: rotate(-10deg); align-self: flex-end; width: 14px; height: 10px; }

  .petalos-der .petalo:nth-child(1) { transform: rotate(30deg); align-self: flex-start; }
  .petalos-der .petalo:nth-child(2) { transform: rotate(-20deg); width: 18px; height: 12px; }
  .petalos-der .petalo:nth-child(3) { transform: rotate(10deg); align-self: flex-start; width: 14px; height: 10px; }

  .fer-descripcion {
    font-size: 16px;
    line-height: 1.5;
    color: #e6e6e6;
  }

  /* ---- Tarjeta de resultado estilo "Orión" ---- */

  .resultado-orion {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 40px;
    max-width: 700px;
    width: 100%;
    text-align: center;
  }

  .badge-rosa {
    display: inline-block;
    background: #e6127a;
    color: #0a0a0a;
    font-weight: bold;
    font-size: 20px;
    padding: 8px 20px;
    border-radius: 6px;
    margin-bottom: 32px;
  }

  .orion-subtitulo {
    font-size: 20px;
    font-weight: bold;
    margin: 0 0 12px 0;
  }

  .orion-titulo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .orion-titulo-principal {
    font-size: 40px;
    font-weight: 900;
    line-height: 1.05;
    margin: 0;
  }

  .gotas-rosa {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .gota-rosa {
    width: 14px;
    height: 14px;
    background: #e6127a;
    border-radius: 50% 50% 50% 0;
    transform: rotate(45deg);
  }

  .gota-rosa-sm {
    width: 9px;
    height: 9px;
    align-self: flex-end;
  }

  .orion-descripcion {
    font-size: 16px;
    line-height: 1.5;
    color: #e6e6e6;
  }

  /* ---- Pantalla de selección de personaje ---- */

  .selector-container {
    max-width: 700px;
    width: 100%;
    border: 2px solid #000000;
  }

  .selector-header {
    background: #0a0a0a;
    padding: 24px 20px 0 20px;
    text-align: center;
  }

  .selector-eyebrow {
    color: #ffffff;
    font-size: 24px;
    font-weight: 900;
    margin: 0;
  }

  .selector-guia-wrap {
    position: relative;
    margin-top: 8px;
  }

  .selector-guia-barra {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 20px;
    background: #ffd414;
    transform: translateY(-50%);
  }

  .selector-guia {
    position: relative;
    color: #ffffff;
    font-size: 64px;
    font-weight: 900;
    margin: 0;
    letter-spacing: 2px;
  }

  .selector-pills {
    background: #0a0a0a;
    display: flex;
    padding: 16px 20px 24px 20px;
    gap: 12px;
  }

  .selector-pill {
    flex: 1;
    background: #ffffff;
    border: none;
    border-radius: 8px;
    font-weight: 900;
    font-size: 16px;
    padding: 12px 8px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--pill-shadow, #999);
  }

  .selector-pill.color-turquesa { --pill-shadow: #3fc9c2; }
  .selector-pill.color-amarillo { --pill-shadow: #ffd414; }
  .selector-pill.color-rosa     { --pill-shadow: #e6127a; }

  .selector-grid {
    display: flex;
  }

  .selector-columna {
    flex: 1;
    cursor: pointer;
    border: none;
    padding: 0;
    display: flex;
    flex-direction: column;
    font: inherit;
  }

  .selector-panel {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: 280px;
    overflow: hidden;
  }

  .selector-panel.color-turquesa { background: #3fc9c2; }
  .selector-panel.color-amarillo { background: #ffd414; }
  .selector-panel.color-rosa     { background: #e6127a; }

  .selector-panel img {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }

  .selector-categoria {
    background: #ffffff;
    color: #0a0a0a;
    font-weight: 900;
    font-size: 16px;
    text-align: center;
    padding: 12px 0;
    border-top: 2px solid #000000;
  }

  /* ---- Pantalla de preguntas estilo "Nico" ---- */

  .pregunta-nico {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 32px;
    max-width: 700px;
    width: 100%;
  }

  .pregunta-nico-titulo {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.15;
    margin: 24px 0 24px 0;
  }

  .opciones-nico {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
  }

  .opcion-nico {
    flex: 1;
    background: #0a0a0a;
    color: #ffffff;
    border: 2px solid #ffffff;
    border-radius: 12px;
    padding: 20px;
    font-size: 17px;
    font-weight: bold;
    text-align: left;
    cursor: pointer;
    box-shadow: 6px 6px 0 #3fc9c2;
    min-height: 90px;
  }

  .opcion-nico.opcion-forma {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 160px;
  }

  .opcion-nico.seleccionada {
    background: #3fc9c2;
    color: #0a0a0a;
    box-shadow: 6px 6px 0 #ffffff;
  }

  .opcion-nico svg {
    display: block;
  }

  .boton-siguiente-nico {
    background: #3fc9c2;
    color: #0a0a0a;
    border: 2px solid #ffffff;
    border-radius: 8px;
    font-weight: 900;
    font-size: 16px;
    padding: 14px 28px;
    cursor: pointer;
    box-shadow: 5px 5px 0 #ffffff;
  }

  .boton-siguiente-nico:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ---- Pantalla de preguntas estilo "Orión" ---- */

  .pregunta-orion {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 32px;
    max-width: 700px;
    width: 100%;
  }

  .pregunta-orion-titulo {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.15;
    margin: 24px 0 24px 0;
  }

  .opciones-orion {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
    align-items: flex-start;
  }

  .opcion-orion {
    flex: 1;
    background: #0a0a0a;
    color: #ffffff;
    border: 2px solid #ffffff;
    border-radius: 20px;
    padding: 20px;
    font-size: 17px;
    font-weight: normal;
    text-align: center;
    cursor: pointer;
    box-shadow: 6px 6px 0 #e6127a;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .opcion-orion.seleccionada {
    background: #e6127a;
    color: #0a0a0a;
    box-shadow: 6px 6px 0 #ffffff;
  }

  .opcion-orion-imagen {
    flex: 1;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: #ffffff;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .opcion-orion-imagen img {
    max-width: 100%;
    max-height: 140px;
    filter: drop-shadow(6px 6px 0 #e6127a);
  }

  .opcion-orion-imagen.seleccionada img {
    filter: drop-shadow(6px 6px 0 #ffffff);
  }

  .opcion-orion-caption {
    font-weight: 900;
    font-size: 15px;
  }

  .boton-siguiente-orion {
    background: #e6127a;
    color: #0a0a0a;
    border: 2px solid #ffffff;
    border-radius: 8px;
    font-weight: 900;
    font-size: 16px;
    padding: 14px 28px;
    cursor: pointer;
    box-shadow: 5px 5px 0 #ffffff;
  }

  .boton-siguiente-orion:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ---- Pantalla de preguntas estilo "Fer" ---- */

  .pregunta-fer {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 32px;
    max-width: 700px;
    width: 100%;
  }

  .pregunta-fer-titulo {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.15;
    margin: 24px 0 24px 0;
  }

  .opciones-fer {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
  }

  .opcion-fer {
    flex: 1;
    background: #0a0a0a;
    color: #ffffff;
    border: 2px solid #ffffff;
    border-radius: 12px;
    padding: 20px;
    font-size: 17px;
    font-weight: bold;
    text-align: left;
    cursor: pointer;
    box-shadow: 6px 6px 0 #ffd414;
    min-height: 90px;
  }

  .opcion-fer.seleccionada {
    background: #ffd414;
    color: #0a0a0a;
    box-shadow: 6px 6px 0 #ffffff;
  }

  .boton-siguiente-fer {
    background: #ffd414;
    color: #0a0a0a;
    border: 2px solid #ffffff;
    border-radius: 8px;
    font-weight: 900;
    font-size: 16px;
    padding: 14px 28px;
    cursor: pointer;
    box-shadow: 5px 5px 0 #ffffff;
  }

  .boton-siguiente-fer:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ---- Pantalla de portada ---- */

  .intro-container {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 60px 40px;
    max-width: 700px;
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .intro-franja {
    position: absolute;
    left: -15%;
    right: -15%;
    top: 48%;
    height: 90px;
    background: #ffd414;
    transform: rotate(-4deg);
    z-index: 0;
  }

  .intro-eyebrow {
    position: relative;
    z-index: 1;
    font-size: 30px;
    font-weight: 900;
    margin: 0;
  }

  .intro-npc {
    position: relative;
    z-index: 1;
    font-size: 96px;
    font-weight: 900;
    margin: 0 0 40px 0;
    letter-spacing: 2px;
    color: #ffffff;
    -webkit-text-stroke: 3px #000000;
    text-stroke: 3px #000000;
  }

  .intro-boton-wrap {
    position: relative;
    z-index: 1;
    display: inline-block;
  }

  .intro-boton {
    background: #3fc9c2;
    color: #ffffff;
    border: 2px solid #ffffff;
    border-radius: 40px;
    font-weight: 900;
    font-size: 18px;
    padding: 16px 36px;
    cursor: pointer;
    box-shadow: 5px 5px 0 rgba(255, 255, 255, 0.5);
  }

  .intro-cursor {
    position: absolute;
    bottom: -10px;
    right: -18px;
    width: 22px;
    height: 22px;
    background: #ffffff;
    border: 2px solid #0a0a0a;
    clip-path: polygon(0 0, 0 80%, 25% 65%, 45% 100%, 60% 90%, 40% 60%, 100% 55%);
  }

  /* ---- Pantalla de decisión ---- */

  .decision-container {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 700px;
    width: 100%;
    text-align: center;
  }

  .decision-titulo {
    font-size: 32px;
    font-weight: 900;
    margin: 0 0 8px 0;
  }

  .decision-subtitulo {
    font-size: 16px;
    color: #bbbbbb;
    margin: 0 0 32px 0;
  }

  .decision-opciones {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .decision-boton {
    flex: 1;
    max-width: 260px;
    background: #0a0a0a;
    color: #ffffff;
    border: 2px solid #ffffff;
    border-radius: 12px;
    padding: 22px 16px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 6px 6px 0 #ffffff33;
  }

  .decision-boton:hover {
    background: #1a1a1a;
  }

  /* ---- Pantallas de verificar / información ---- */

  .info-container {
    background: #0a0a0a;
    color: #ffffff;
    border-radius: 24px;
    padding: 40px;
    max-width: 700px;
    width: 100%;
  }

  .info-titulo {
    font-size: 28px;
    font-weight: 900;
    margin: 0 0 4px 0;
  }

  .info-subtitulo {
    font-size: 15px;
    color: #bbbbbb;
    margin: 0 0 28px 0;
  }

  .checklist {
    list-style: none;
    padding: 0;
    margin: 0 0 32px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 16px;
    line-height: 1.4;
  }

  .checklist li::before {
    content: "✓";
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: 2px solid #ffffff;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 14px;
  }

  .info-bloque {
    margin-bottom: 24px;
  }

  .info-bloque h3 {
    font-size: 18px;
    margin: 0 0 6px 0;
  }

  .info-bloque p {
    font-size: 15px;
    line-height: 1.5;
    color: #dddddd;
    margin: 0;
  }

  .info-shortcut {
    border: 2px dashed #ff8a3d;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 15px;
    color: #ffb37a;
    background: none;
    text-align: left;
    cursor: pointer;
    width: 100%;
    margin-bottom: 28px;
  }

  .info-shortcut strong {
    color: #ff8a3d;
  }

  .info-continuar {
    background: #ffffff;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-weight: 900;
    font-size: 16px;
    padding: 14px 28px;
    cursor: pointer;
  }

  .boton-consejos {
    margin-top: 28px;
  }

  /* Todas las pantallas comparten el mismo ancho y una altura mínima similar */
  .resultado-nico,
  .resultado-fer,
  .resultado-orion,
  .selector-container,
  .pregunta-nico,
  .pregunta-orion,
  .pregunta-fer,
  .intro-container,
  .decision-container,
  .info-container {
    min-height: 480px;
    box-sizing: border-box;
  }

  /* ======================= RESPONSIVE (móvil) ======================= */

  @media (max-width: 640px) {

    .top-menu {
      padding: 10px 14px;
    }

    .top-menu-logo {
      font-size: 13px;
    }

    .top-menu-reiniciar {
      padding: 6px 12px;
      font-size: 12px;
    }

    #app {
      padding: 16px 12px 32px 12px;
    }

    .resultado-nico,
    .resultado-fer,
    .resultado-orion,
    .selector-container,
    .pregunta-nico,
    .pregunta-orion,
    .pregunta-fer,
    .intro-container,
    .decision-container,
    .info-container {
      min-height: 0;
    }

    /* Contenedores: menos padding en pantallas chicas */
    .resultado-nico,
    .resultado-fer,
    .resultado-orion,
    .selector-container,
    .pregunta-nico,
    .pregunta-orion,
    .pregunta-fer,
    .intro-container,
    .decision-container,
    .info-container {
      padding: 24px 18px;
      border-radius: 16px;
    }

    /* Portada */
    .intro-npc {
      font-size: 52px;
    }

    .intro-eyebrow {
      font-size: 20px;
    }

    .intro-franja {
      height: 50px;
    }

    .intro-boton {
      font-size: 15px;
      padding: 12px 24px;
    }

    /* Decisión / info */
    .decision-titulo {
      font-size: 24px;
    }

    .decision-opciones {
      flex-direction: column;
    }

    .decision-boton {
      max-width: 100%;
    }

    .info-titulo {

          <h1 class="selector-guia">GUÍA</h1>
        </div>
      </div>
      <div class="selector-pills">${pillsHtml}</div>
      <div class="selector-grid">${columnasHtml}</div>
    `;

    contenedor.querySelectorAll("[data-id]").forEach(el => {
      el.onclick = () => elegirPersonaje(el.dataset.id);
    });

    app.appendChild(contenedor);
    return;
  }

  const personaje = PERSONAJES[personajeActual];

  // Pantalla 2: preguntas
  if (indicePregunta < personaje.preguntas.length) {
    const p = personaje.preguntas[indicePregunta];
    const esUltima = indicePregunta === personaje.preguntas.length - 1;

    if (personajeActual === "nico") {
      const formas = {
        "cuadrado": '<svg width="44" height="44" viewBox="0 0 44 44"><rect width="44" height="44" fill="currentColor"/></svg>',
        "triángulo": '<svg width="48" height="44" viewBox="0 0 48 44"><polygon points="24,0 48,44 0,44" fill="currentColor"/></svg>',
        "círculo": '<svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="22" fill="currentColor"/></svg>'
      };

      const contenedor = document.createElement("div");
      contenedor.className = "pregunta-nico";

      let opcionesHtml = "";
      ["A", "B", "C"].forEach(letra => {
        const texto = p["opcion" + letra];
        const claveForma = texto.toLowerCase();
        const esForma = formas.hasOwnProperty(claveForma);
        const seleccionada = seleccionActual === letra ? " seleccionada" : "";
        const contenido = esForma ? formas[claveForma] : texto;
        opcionesHtml += `<button class="opcion-nico${esForma ? " opcion-forma" : ""}${seleccionada}" data-letra="${letra}">${contenido}</button>`;
      });

      contenedor.innerHTML = `
        <span class="badge">${personaje.categoria}</span>
        <h2 class="pregunta-nico-titulo">${indicePregunta + 1}. ${p.pregunta}</h2>
        <div class="opciones-nico">${opcionesHtml}</div>
        <button class="boton-siguiente-nico" ${seleccionActual === null ? "disabled" : ""}>${esUltima ? "TERMINAR" : "SIGUIENTE"}</button>
      `;

      contenedor.querySelectorAll(".opcion-nico").forEach(el => {
        el.onclick = () => seleccionar(el.dataset.letra);
      });
      contenedor.querySelector(".boton-siguiente-nico").onclick = avanzar;

      app.appendChild(contenedor);
      return;
    }

    if (personajeActual === "orion") {
      const imagenesPiedra = {
        "turmalina negra": "turmalina-negra.png",
        "cuarzo rosa": "cuarzo-rosa.png",
        "aguamarina": "aguamarina.png"
      };

      const contenedor = document.createElement("div");
      contenedor.className = "pregunta-orion";

      let opcionesHtml = "";
      ["A", "B", "C"].forEach(letra => {
        const texto = p["opcion" + letra];
        const claveImg = texto.toLowerCase();
        const esImagen = imagenesPiedra.hasOwnProperty(claveImg);
        const seleccionada = seleccionActual === letra ? " seleccionada" : "";

        if (esImagen) {
          opcionesHtml += `
            <button class="opcion-orion-imagen${seleccionada}" data-letra="${letra}">
              <img src="img/${imagenesPiedra[claveImg]}" alt="${texto}">
              <span class="opcion-orion-caption">${texto}</span>
            </button>
          `;
        } else {
          opcionesHtml += `<button class="opcion-orion${seleccionada}" data-letra="${letra}">${texto}</button>`;
        }
      });

      contenedor.innerHTML = `
        <span class="badge-rosa">${personaje.categoria}</span>
        <h2 class="pregunta-orion-titulo">${indicePregunta + 1}. ${p.pregunta}${indicePregunta === 0 ? " ✨" : ""}</h2>
        <div class="opciones-orion">${opcionesHtml}</div>
        <button class="boton-siguiente-orion" ${seleccionActual === null ? "disabled" : ""}>${esUltima ? "TERMINAR" : "SIGUIENTE"}</button>
      `;

      contenedor.querySelectorAll("[data-letra]").forEach(el => {
        el.onclick = () => seleccionar(el.dataset.letra);
      });
      contenedor.querySelector(".boton-siguiente-orion").onclick = avanzar;

      app.appendChild(contenedor);
      return;
    }

    // Pantalla de preguntas estilo "Fer"
    const contenedor = document.createElement("div");
    contenedor.className = "pregunta-fer";

    let opcionesHtml = "";
    ["A", "B", "C"].forEach(letra => {
      const texto = p["opcion" + letra];
      const seleccionada = seleccionActual === letra ? " seleccionada" : "";
      opcionesHtml += `<button class="opcion-fer${seleccionada}" data-letra="${letra}">${texto}</button>`;
    });

    contenedor.innerHTML = `
      <span class="badge-amarillo">${personaje.categoria}</span>
      <h2 class="pregunta-fer-titulo">${indicePregunta + 1}. ${p.pregunta}</h2>
      <div class="opciones-fer">${opcionesHtml}</div>
      <button class="boton-siguiente-fer" ${seleccionActual === null ? "disabled" : ""}>${esUltima ? "TERMINAR" : "SIGUIENTE"}</button>
    `;

    contenedor.querySelectorAll(".opcion-fer").forEach(el => {
      el.onclick = () => seleccionar(el.dataset.letra);
    });
    contenedor.querySelector(".boton-siguiente-fer").onclick = avanzar;

    app.appendChild(contenedor);
    return;
  }

  // Pantalla 3: resultado
  const clave = respuestas.join(""); // ej: "ABC"
  const resultado = personaje.resultados[clave];

  if (!resultado) {
    const aviso = document.createElement("p");
    aviso.textContent = "No se encontró resultado para la combinación: " + clave;
    app.appendChild(aviso);
    return;
  }

  // Pantalla 3b: consejos (se muestra después del resultado)
  if (mostrarConsejos) {
    const badgeClasePorColor = { turquesa: "badge", amarillo: "badge-amarillo", rosa: "badge-rosa" };
    const badgeClase = badgeClasePorColor[personaje.color];

    const tarjeta = document.createElement("div");
    tarjeta.className = "info-container";

    tarjeta.innerHTML = `
      <span class="${badgeClase}">${personaje.categoria}</span>
      <h2 class="info-titulo">Consejos</h2>
      <p class="info-subtitulo">Para poner en práctica "${resultado.concepto}"</p>
      <ul class="checklist">
        <li>Escríbelo en un lugar visible: repetirlo ayuda a interiorizarlo.</li>
        <li>Revisa que cada pieza que publiques se conecte con este concepto.</li>
        <li>Compártelo con alguien de confianza y pide una opinión honesta.</li>
        <li>Vuelve a este resultado en unos meses para ver si sigue representándote.</li>
      </ul>
    `;

    app.appendChild(tarjeta);
    return;
  }

  if (resultado.arquetipo && resultado.imagen) {
    // Tarjeta estilo "Nico": concepto + ejemplo a la izquierda, arquetipo + imagen a la derecha
    const tarjeta = document.createElement("div");
    tarjeta.className = "resultado-nico";

    tarjeta.innerHTML = `
      <div class="resultado-nico-fila">
        <div class="col-texto">
          <span class="badge">${personaje.categoria}</span>
          <p class="subtitulo">Tu concepto sería:</p>
          <div class="titulo-wrap">
            <div class="gotas gotas-izq">
              <span class="gota"></span>
              <span class="gota gota-sm"></span>
            </div>
            <h1 class="titulo-principal">${resultado.concepto}</h1>
            <div class="gotas gotas-der">
              <span class="gota"></span>
              <span class="gota gota-sm"></span>
            </div>
          </div>
          <p class="descripcion">${resultado.ejemplo}</p>
        </div>
        <div class="col-imagen">
          <div class="arquetipo-titulo">
            <p class="arquetipo-label">Arquetipo:</p>
            <p class="arquetipo-nombre">${resultado.arquetipo}</p>
          </div>
          <div class="imagen-box">
            <img src="img/${resultado.imagen}" alt="${resultado.arquetipo}">
          </div>
        </div>
      </div>
      <button class="info-continuar boton-consejos">Ver consejos</button>
    `;

    app.appendChild(tarjeta);
    tarjeta.querySelector(".boton-consejos").onclick = verConsejos;
  } else if (resultado.perfil) {
    // Tarjeta estilo "Fer": centrada, con badge y perfil arriba
    const tarjeta = document.createElement("div");
    tarjeta.className = "resultado-fer";

    tarjeta.innerHTML = `
      <div class="fer-encabezado">
        <span class="badge-amarillo">${personaje.categoria}</span>
        <div>
          <p class="perfil-label">Perfil:</p>
          <p class="perfil-nombre">${resultado.perfil}</p>
        </div>
      </div>
      <p class="fer-subtitulo">Tu concepto sería:</p>
      <div class="fer-titulo-wrap">
        <div class="petalos petalos-izq">
          <span class="petalo"></span>
          <span class="petalo"></span>
          <span class="petalo"></span>
        </div>
        <h1 class="fer-titulo-principal">${resultado.concepto}</h1>
        <div class="petalos petalos-der">
          <span class="petalo"></span>
          <span class="petalo"></span>
          <span class="petalo"></span>
        </div>
      </div>
      <p class="fer-descripcion">${resultado.ejemplo}</p>
      <button class="info-continuar boton-consejos">Ver consejos</button>
    `;

    app.appendChild(tarjeta);
    tarjeta.querySelector(".boton-consejos").onclick = verConsejos;
  } else if (personajeActual === "orion") {
    // Tarjeta estilo "Orión": centrada, badge rosa arriba, gotas a los lados del título
    const tarjeta = document.createElement("div");
    tarjeta.className = "resultado-orion";

    tarjeta.innerHTML = `
      <span class="badge-rosa">${personaje.categoria}</span>
      <p class="orion-subtitulo">Tu concepto sería:</p>
      <div class="orion-titulo-wrap">
        <div class="gotas-rosa">
          <span class="gota-rosa"></span>
          <span class="gota-rosa gota-rosa-sm"></span>
        </div>
        <h1 class="orion-titulo-principal">${resultado.concepto}</h1>
        <div class="gotas-rosa">
          <span class="gota-rosa"></span>
          <span class="gota-rosa gota-rosa-sm"></span>
        </div>
      </div>
      <p class="orion-descripcion">${resultado.ejemplo}</p>
      <button class="info-continuar boton-consejos">Ver consejos</button>
    `;

    app.appendChild(tarjeta);
    tarjeta.querySelector(".boton-consejos").onclick = verConsejos;
  } else {
    // Resultado genérico: lista simple de campos
    const contenedor = document.createElement("div");
    contenedor.className = "resultado-orion";

    let camposHtml = "";
    Object.entries(resultado).forEach(([campo, valor]) => {
      camposHtml += `<p><strong>${campo}:</strong> ${valor}</p>`;
    });

    contenedor.innerHTML = camposHtml + `<button class="info-continuar boton-consejos">Ver consejos</button>`;

    app.appendChild(contenedor);
    contenedor.querySelector(".boton-consejos").onclick = verConsejos;
  }
}

/* ======================= INICIO ======================= */

iniciar();
</script>

</body>
</html>
