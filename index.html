<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>NPC Challenge</title>

<style>
*{
 box-sizing:border-box;
 margin:0;
 padding:0;
 font-family:Arial, Helvetica, sans-serif;
}

body{
 background:#000;
 color:white;
}

/* -------------------
 BARRA SUPERIOR
--------------------*/
header{
height:70px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 8%;
}

.logo{
color:black;
font-size:28px;
font-weight:900;
}

.join{
background:#ffd900;
border:3px solid black;
border-radius:10px;
padding:8px 15px;
font-weight:bold;
}

/* -------------------
 HERO
--------------------*/


.hero{

height:650px;

position:relative;

overflow:hidden;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

text-align:center;

}



/* bandas amarillas */


.hero::before{

content:"";

position:absolute;

width:140%;

height:180px;

background:#ffd900;

transform:rotate(-5deg);

top:220px;

z-index:0;

}



/* texto */


.hero h2{

font-size:60px;

z-index:1;

}


.hero h1{

font-size:150px;

font-weight:900;

z-index:1;

-webkit-text-stroke:5px black;

color:white;

}



.btn{


margin-top:40px;

background:#42b8b8;

border:5px solid white;

border-radius:20px;

padding:15px 40px;

font-size:30px;

font-weight:bold;

color:white;

cursor:pointer;

}



/* -------------------
 PERSONAJES
--------------------*/


.team{

padding:40px 5%;

text-align:center;

}


.team h2{

font-size:70px;

margin-bottom:40px;

}



.cards{

display:flex;

gap:20px;

justify-content:center;

flex-wrap:wrap;

}



.card{

width:300px;

height:450px;

background:#eee;

color:black;

border-radius:20px;

overflow:hidden;

cursor:pointer;

transition:.3s;

}



.card:hover{

transform:scale(1.05);

}


.card img{

width:100%;

height:80%;

object-fit:cover;

}



.card h3{

font-size:30px;

}



/* -------------------
 RESPONSIVE
--------------------*/


@media(max-width:700px){


.hero h2{

font-size:35px;

}


.hero h1{

font-size:80px;

}


.team h2{

font-size:40px;

}



.card{

width:90%;

}



}



</style>


</head>


<body>


<header>

<div class="logo">
NPC!
</div>


<button class="join">
Únete al reto
</button>


</header>



<section class="hero">


<h2>
¿Tu marca es un
</h2>


<h1>
NPC?
</h1>


<button class="btn">
Descúbrelo aquí
</button>


</section>




<section class="team">


<h2>
¿Qué TEAM eres?
</h2>



<div class="cards">


<div class="card">

<img src="https://via.placeholder.com/300x400">

<h3>Nico</h3>

</div>



<div class="card">

<img src="https://via.placeholder.com/300x400">

<h3>Fer</h3>

</div>



<div class="card">

<img src="https://via.placeholder.com/300x400">

<h3>Ori</h3>

</div>



</div>


</section>



<script>


document.querySelector(".btn")
.onclick=function(){

document.querySelector(".team")
.scrollIntoView({

behavior:"smooth"

});

};


</script>



</body>

</html>
