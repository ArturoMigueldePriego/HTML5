<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPC! - Elige a tu GUÍA</title>
  <link rel="stylesheet" href="navbar.css">

  <style>
    /* Carga de Fuentes desde la carpeta local 'fonts/' */
    @font-face {
      font-family: 'Unbounded';
      src: url('fonts/Unbounded-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Unbounded';
      src: url('fonts/Unbounded-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'Montserrat';
      src: url('fonts/Montserrat-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    /* Reset General */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background-color: #000000;
    }

    body {
      font-family: 'Unbounded', sans-serif;
      color: #000000;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* CONTENEDOR PRINCIPAL (Unificado a 600px como index, concepto y métodos) */
    .site-wrapper {
      width: 100%;
      max-width: 600px;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- BARRA DE NAVEGACIÓN SUPERIOR (NAVBAR) --- */
    .navbar {
      background-color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      width: 100%;
      box-sizing: border-box;
      border-bottom: 2px solid #000000;
    }

    .brand-logo {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 900;
      color: #000000;
      text-decoration: none;
      letter-spacing: -1px;
    }

    .nav-links {
      display: flex;
      gap: clamp(0.8rem, 3vw, 2rem);
      list-style: none;
    }

    .nav-links a {
      font-family: 'Unbounded', sans-serif;
      text-decoration: none;
      color: #000000;
      font-size: clamp(0.75rem, 2.2vw, 0.95rem);
      font-weight: 700;
      transition: opacity 0.2s;
    }

    .nav-links a:hover {
      opacity: 0.7;
    }

    /* --- SECCIÓN TÍTULO Y BOTONES --- */
    .hero-section {
      background-color: #000000;
      text-align: center;
      padding: clamp(25px, 5vw, 35px) 20px clamp(20px, 4vw, 25px) 20px;
      position: relative;
    }

    .hero-title-small {
      color: #ffffff;
      font-size: clamp(1.4rem, 4.5vw, 1.9rem);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hero-title-container {
      position: relative;
      margin-bottom: clamp(20px, 4vw, 28px);
      display: inline-block;
      width: 100%;
    }

    .hero-title-main {
      font-size: clamp(2.5rem, 9vw, 3.8rem);
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
      line-height: 1;
    }

    /* Franja amarilla detrás del título GUÍA */
    .yellow-stripe {
      background-color: #ffeb00;
      height: clamp(12px, 3.5vw, 18px);
      width: 100%;
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      z-index: 1;
    }

    /* CUADRÍCULA DE BOTONES STICKER */
    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 2.5vw, 15px);
      max-width: 100%;
      margin: 0 auto;
    }

    .btn-card {
      background-color: #ffffff;
      border: 2.5px solid #000000;
      border-radius: 10px;
      padding: clamp(10px, 2.5vw, 14px) 5px;
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(0.85rem, 3vw, 1.1rem);
      font-weight: 900;
      text-decoration: none;
      color: #000000;
      text-align: center;
      display: block;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    /* Sombras sticker */
    .btn-card.nico {
      box-shadow: -4px 4px 0px #31b3b2;
    }
    .btn-card.fer {
      box-shadow: 4px 4px 0px #ffeb00;
    }
    .btn-card.orion {
      box-shadow: 4px 4px 0px #e60067;
    }

    .btn-card:hover {
      transform: translateY(-2px);
    }

    /* --- COLUMNAS DE PERSONAJES (STICKERS) --- */
    .characters-section {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      position: relative;
    }

    .character-column {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: clamp(320px, 75vw, 440px); /* Altura adaptativa pero uniforme */
      padding-top: 15px;
      overflow: hidden;
    }

    .col-nico {
      background-color: #31b3b2;
    }
    .col-fer {
      background-color: #ffeb00;
    }
    .col-orion {
      background-color: #e60067;
    }

    .character-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.25));
    }

    /* Fallback por si la imagen no carga */
    .img-placeholder {
      width: 80%;
      height: 80%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      text-align: center;
      border: 3px dashed rgba(0,0,0,0.3);
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
    }

    /* --- BARRA INFERIOR DE CATEGORÍAS --- */
    .categories-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background-color: #ffffff;
      border-top: 2.5px solid #000000;
      border-bottom: 12px solid #000000;
      text-align: center;
    }

    .category-item {
      padding: clamp(12px, 3vw, 16px) 2px;
      font-size: clamp(0.7rem, 2.4vw, 1rem);
      font-weight: 800;
      color: #000000;
      border-right: 2px solid #000000;
    }

    .category-item:last-child {
      border-right: none;
    }

    /* AJUSTE RESPONSIVE MÓVIL (≤ 600px) */
    @media (max-width: 600px) {
      .site-wrapper {
        max-width: 100vw;
      }
      .navbar {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="site-wrapper">

    <!-- BARRA DE NAVEGACIÓN SUPERIOR (FUERA DEL CONTENEDOR PARA OCUPAR TODA LA ANCHURA) -->
    <header class="navbar">
      <a href="index.html" class="brand-logo-link">
        <img src="images/logo.png" alt="NPC! Logo" class="brand-logo-img">
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="concepto.html">Concepto</a></li>
          <li><a href="metodos.html">Métodos</a></li>
          <li><a href="guias.html">Tu guía</a></li>
        </ul>
      </nav>
    </header>


    <!-- Sección Principal -->
    <main>
      <section class="hero-section">
        <h2 class="hero-title-small">Elige a tu</h2>
        <div class="hero-title-container">
          <div class="yellow-stripe"></div>
          <h1 class="hero-title-main">GUÍA</h1>
        </div>

        <!-- Botones NICO, FER y ORIÓN -->
        <div class="buttons-grid">
          <a href="nico.html" class="btn-card nico">NICO</a>
          <a href="fer.html" class="btn-card fer">FER</a>
          <a href="orion.html" class="btn-card orion">ORIÓN</a>
        </div>
      </section>

      <!-- Columnas con Personajes PNG -->
      <section class="characters-section">
        <div class="character-column col-nico">
          <img src="images/nico.png" alt="Nico - Ilustración" class="character-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="img-placeholder" style="display:none;">nico.png</div>
        </div>

        <div class="character-column col-fer">
          <img src="images/fer.png" alt="Fer - Crafting" class="character-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="img-placeholder" style="display:none;">fer.png</div>
        </div>

        <div class="character-column col-orion">
          <img src="images/orion.png" alt="Orión - Aromaterapia" class="character-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="img-placeholder" style="display:none;">orion.png</div>
        </div>
      </section>

      <!-- Barra Inferior de Categorías -->
      <div class="categories-bar">
        <div class="category-item">Ilustración</div>
        <div class="category-item">Crafting</div>
        <div class="category-item">Aromaterapia</div>
      </div>
    </main>

  </div>

</body>
</html>
